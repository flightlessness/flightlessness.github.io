<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
  
<script>
(function () {
  const btn = document.getElementById('theme-toggle');
  const icon = document.getElementById('theme-toggle-icon');

  if (!btn || !icon) return;

  // update button state and icon
  function applyTheme(t) {
    if (t === 'dark') {
      document.documentElement.classList.add('dark');
      btn.setAttribute('aria-pressed', 'true');
      icon.textContent = '🌙'; // moon
    } else {
      document.documentElement.classList.remove('dark');
      btn.setAttribute('aria-pressed', 'false');
      icon.textContent = '☀️'; // sun
    }
  }

  // determine initial theme: stored > system > light
  function currentTheme() {
    try {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || stored === 'light') return stored;
    } catch (e) {}
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  // initialize UI
  applyTheme(currentTheme());

  // toggle handler
  btn.addEventListener('click', function () {
    const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    try { localStorage.setItem('theme', next); } catch (e) {}
    applyTheme(next);
  });

  // keep UI consistent if user changes system preference while page open
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener?.('change', e => {
      // only follow system if user hasn't explicitly selected a theme
      try {
        const stored = localStorage.getItem('theme');
        if (!stored) applyTheme(e.matches ? 'dark' : 'light');
      } catch (err) {}
    });
  }
})();
</script>
  
<body>

  {% include nav.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  {% comment %} optional analytics include, add if needed {% endcomment %}
  {% include analytics.html %}
</body>
</html>
