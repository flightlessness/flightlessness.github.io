<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- indicate capability and the UI color -->
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light dark">

<!-- small script to apply stored or system theme immediately (prevents flash) -->
<script>
  (function() {
    try {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark') document.documentElement.classList.add('dark');
      else if (stored === 'light') document.documentElement.classList.remove('dark');
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    } catch (e) {
      /* ignore storage errors */
    }
  })();
</script>
<title>
  Classical Music | flightlessness
</title>

<link rel="stylesheet" href="/custom.css">

  <div id="bottom"></div>

  


  <script>
  (function () {
    const btn = document.getElementById('theme-toggle');
    const icon = document.getElementById('theme-toggle-icon');
    if (!btn || !icon) return;

    function applyTheme(t) {
  const isDark = t === 'dark';
  document.documentElement.classList.toggle('dark', isDark);
  btn.setAttribute('aria-pressed', isDark);

  if (isDark) {
    // show SUN icon (to switch to light)
    icon.innerHTML = `
      <circle cx="12" cy="12" r="4"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    `;
  } else {
    // show MOON icon (to switch to dark)
    icon.innerHTML = `
      <path d="M21 12.79A9 9 0 1 1 11.21 3
               7 7 0 0 0 21 12.79z"></path>
    `;
  }
}
    function currentTheme() {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || stored === 'light') return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    applyTheme(currentTheme());

    btn.addEventListener('click', function () {
      const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });
  })();
  </script>

</body>
